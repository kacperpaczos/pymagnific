          example: https://www.example.com/webhook
          format: uri
          type: string
        image:
          description: |
            First-frame image used to start the video. Supports Base64 encoding (including a `data:image/...;base64,...` data URI)
            or a publicly accessible image URL.

            **Image requirements:**
            - Minimum: 300x300 pixels
            - Maximum: 50MB file size
            - Aspect ratio: 1:2.5 to 2.5:1
            - Formats: JPG, JPEG, PNG
            - Only the first frame is supported
          example: https://example.com/my-image.jpg
          type: string
        prompt:
          description: |
            Optional text prompt to guide the motion and animation style. If omitted, motion is inferred from the
            source image. Maximum 2500 characters.

            **Tips for better results:**
            - Describe the movement, camera behavior, and visual style
            - Add negative descriptions inline (for example, "no text, no blur") to steer the model away from unwanted elements
          example: The subject slowly turns their head and smiles
          maxLength: 2500
          type: string
        duration:
          default: "5"
          description: |
            Duration of the generated video in seconds.

            **Range:** 3-15 seconds
          enum:
