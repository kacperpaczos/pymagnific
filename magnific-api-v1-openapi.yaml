    input-definition:
      description: |
        Defines a single input parameter for the flow.
        Use the `api_key` field (recommended) or the `id` field (legacy) as the identifier in the `inputs` object when calling the run endpoint.
      example:
        id: input-4050c3f3-8a26-4953-97a8-cb97bceb4816-1
        api_key: text_prompt
        key: text_prompt
        type: text
        label: "Text #1"
        config: null
        nodeId: 4050c3f3-8a26-4953-97a8-cb97bceb4816
        default: null
        required: true
        presentation:
          mode: textarea
          type: text
      properties:
        id:
          description: |
            UUID-based identifier for this input. Format: `input-{nodeId}-{n}`.
            Still accepted as a key in the `inputs` object for backward compatibility; prefer `api_key`.
          example: input-4050c3f3-8a26-4953-97a8-cb97bceb4816-1
          type: string
        api_key:
          description: |
            Human-friendly identifier for this input, matching the node name.
            Recommended identifier to use as the key in the `inputs` object when running the flow.
          example: text_prompt
          type: string
        key:
          deprecated: true
          description: |
            (Deprecated) Legacy human-readable key. Superseded by `api_key`; may be absent in newer responses. Prefer `api_key`.
          example: text_prompt
          type: string
        type:
          description: |
            The type of input value expected:
            - `creation`: Image or media file (accepts URL, base64, or creation sqid)
            - `text`: Text prompt or string
            - `number`: Numeric value
            - `select`: Choice from predefined options
          enum:
          - creation
          - text
          - number
          - select
          example: text
          type: string
        label:
          description: Human-readable label for display.
          example: "Text #1"
          type: string
        config:
          $ref: "#/components/schemas/input_definition_config"
        nodeId:
          description: UUID of the flow node this input feeds into.
          example: 4050c3f3-8a26-4953-97a8-cb97bceb4816
          format: uuid
          type: string
        default:
          description: Default value if not provided by the caller. Null means no
            default.
          nullable: true
        required:
          description: Whether this input must be provided when running the flow.
          example: true
          type: boolean
        presentation:
          $ref: "#/components/schemas/input_definition_presentation"
      required:
      - id
      - key
      - required
      - type
      type: object
    run-request:
      properties:
