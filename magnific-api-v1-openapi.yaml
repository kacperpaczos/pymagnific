          - traditional_3_4
          - widescreen_16_9
          - social_story_9_16
          - standard_3_2
          - portrait_2_3
          - horizontal_2_1
          - vertical_1_2
          - social_post_4_5
          example: square_1_1
          type: string
        resolution:
          default: 1k
          description: |
            Resolution multiplier for the generated image.

            - `1k`: Uses base dimensions (default)
            - `2k`: Doubles the base dimensions (capped at 2048px per side)

            Final dimensions are calculated by multiplying base dimensions by the resolution factor,
            then scaling proportionally if either dimension exceeds 2048px, and aligning to multiples of 16.
          enum:
          - 1k
          - 2k
          example: 1k
          type: string
        seed:
          description: |
            Random seed for reproducible results.

            **Use case:** Generate variations of the same image by using the same seed with modified prompts.

            **Valid range:** 0 to 4,294,967,295
            **Default:** Random seed (if not provided)
          example: 42
          maximum: 4294967295
          minimum: 0
          nullable: true
          type: integer
        input_image:
          description: |
            Base64-encoded reference image for **style/subject transfer**.

            **Supported formats:** JPEG, PNG
            **Use cases:**
            - Style transfer from reference images
            - Subject preservation
            - Composition guidance

            **Note:** Supports up to 4 reference images using `input_image`, `input_image_2`, `input_image_3`, and `input_image_4`.
