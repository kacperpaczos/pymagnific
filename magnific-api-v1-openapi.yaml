  parameters:
    per_page:
      description: Results per page. It must be greater than 0.
      example: 100
      in: query
      name: per_page
      schema:
        type: integer
    page:
      description: Page number. It must be greater than 0.
      example: 1
      in: query
      name: page
      required: false
      schema:
        type: integer
    accept-language:
      description: |
        Specifies the search query language using the ISO 639-1 (2-letter
        language code) and the ISO 3166-1 (2-letter country code) for language variants.
        The API will use "en-US" as a default language for processing if a code is not
        provided, or does not exist.
      example: en-US
      in: header
      name: Accept-Language
      required: false
      schema:
        type: string
    page-with-reduced-maximum:
      description: Page number. It must be greater than 0 and less than or equal to
        100.
      example: 1
      in: query
      name: page
      required: false
      schema:
        type: integer
    limit:
      description: Limit results per page. It must be greater than 0.
      example: 100
      in: query
      name: limit
      required: false
      schema:
        type: integer
    order_relevance_recent:
      description: |
        Specifies the order in which search results are returned. The available options allow you to prioritize results based on different criteria:
         - `relevance`: Prioritizes results that are most relevant to the search query.
         - `recent`: Sorts results by the most recent updates.
      example: recent
      in: query
      name: order
      required: false
      schema:
        default: relevance
        enum:
        - relevance
        - recent
        type: string
    term:
      description: "Search term. If only term comes, it is searched for term, if only\
        \ slug comes, it is searched for slug and if both come, it is searched for\
        \ slug"
      example: nature
      in: query
      name: term
      required: false
      schema:
        type: string
    resource_id_string:
