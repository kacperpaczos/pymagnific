          type: number
        square:
          default: 0
          description: "Filters results to only include resources with a square orientation.\
            \ Set to 1 to enable, 0 to disable."
          type: number
        panoramic:
          default: 0
          description: "Filters results to only include resources with a panoramic\
            \ orientation. Set to 1 to enable, 0 to disable."
          type: number
      type: object
    search_resources_filters_parameter_content_type:
      properties:
        photo:
          default: 0
          description: "Filters results to only include resources of type photo. Set\
            \ to 1 to enable, 0 to disable."
          type: number
        psd:
          default: 0
          description: "Filters results to only include resources of type PSD (Photoshop\
            \ Document). Set to 1 to enable, 0 to disable."
          type: number
        vector:
          default: 0
          description: "Filters results to only include resources of type vector.\
            \ Set to 1 to enable, 0 to disable."
          type: number
      type: object
    search_resources_filters_parameter_license:
      properties:
        freemium:
          default: 0
          description: "Filters results to only include resources with a freemium\
            \ license. Set to 1 to enable, 0 to disable."
          type: number
        premium:
          default: 0
          description: "Filters results to only include resources with a premium license.\
            \ Set to 1 to enable, 0 to disable."
          type: number
      type: object
    search_resources_filters_parameter_people:
      properties:
        include:
          default: 0
          description: Filter by included people
          example: 1
          type: number
        exclude:
          default: 0
          description: Filter by excluded people
          example: 1
          type: number
        number:
          description: Filter by number of people
          enum:
          - "1"
          - "2"
          - "3"
          - more_than_three
          example: "2"
          type: string
        age:
          description: Filter by age of the people
          enum:
          - infant
          - child
          - teen
          - young-adult
          - adult
          - senior
          - elder
          example: child
          type: string
        gender:
          description: Filter by gender of the people
          enum:
          - male
          - female
          example: female
          type: string
        ethnicity:
          description: Filter by ethnicity of the people
          enum:
          - south-asian
          - middle-eastern
          - east-asian
          - black
          - hispanic
          - indian
          - white
          - multiracial
          - southeast-asian
          example: black
          type: string
      type: object
    search_resources_filters_parameter_ai_generated:
      properties:
        excluded:
          default: 0
          description: "Excludes AI-generated images from the results. Set to 1 to\
            \ exclude, 0 to include."
          type: number
        only:
          default: 0
          description: "Filters results to only include AI-generated images. Set to\
            \ 1 to include only AI-generated images, 0 to include all images."
          type: number
      type: object
    search_resources_filters_parameter_vector:
      properties:
        type:
          description: File type for vectors
          enum:
