        type: object
      required:
      - image_url
      - prompt
      title: LTX Video 2.0 Pro Image-to-Video Request
      type: object
    ltx-2-fast-i2v-request:
      allOf:
      - $ref: "#/components/schemas/ltx-2-base"
      - properties:
          image_url:
            description: |
              URL of the image to use as the first frame of the video.
              Must be publicly accessible.
              **Supported formats:** JPEG, PNG, WebP
            example: https://example.com/image.jpg
            format: uri
            type: string
          resolution:
            $ref: "#/components/schemas/ltx-2-resolution"
          duration:
            $ref: "#/components/schemas/ltx-2-fast-duration"
          fps:
            $ref: "#/components/schemas/ltx-2-fps"
        type: object
      required:
      - image_url
      - prompt
      title: LTX Video 2.0 Fast Image-to-Video Request
      type: object
    image-upscale-request-content:
      properties:
        image:
          description: |
            Base64 image to upscale
            The resulted image can't exceed maximum allowed size of 25.3 million pixels.
          format: byte
          type: string
        webhook_url:
          description: |
            Optional callback URL that will receive asynchronous notifications whenever the task changes status. The payload sent to this URL is the same as the corresponding GET endpoint response, but without the data field.
          example: https://www.example.com/webhook
          format: uri
          type: string
        scale_factor:
          default: 2x
          description: "Configure scale factor of the image. For higher scales, the\
            \ image will take longer to process"
          enum:
          - 2x
          - 4x
          - 8x
          - 16x
          type: string
        optimized_for:
          default: standard
          description: Styles to optimize the upscale process
          enum:
          - standard
          - soft_portraits
          - hard_portraits
          - art_n_illustration
          - videogame_assets
          - nature_n_landscapes
          - films_n_photography
          - 3d_renders
          - science_fiction_n_horror
          type: string
        prompt:
          description: Prompt to guide the upscale process. Reusing the same prompt
            for AI-generated images will improve the results
          type: string
        creativity:
          default: 0
          description: |
            Increase or decrease AI's creativity.
            Valid values range `[-10, 10]`, default `0`.
          maximum: 10
          minimum: -10
          type: integer
        hdr:
          default: 0
          description: |
            Increase or decrease the level of definition and detail.
            Valid values range `[-10, 10]`, default `0`.
          maximum: 10
          minimum: -10
          type: integer
        resemblance:
          default: 0
          description: |
            Adjust the level of resemblance to the original image.
            Valid values range `[-10, 10]`, default `0`.
          maximum: 10
          minimum: -10
          type: integer
        fractality:
          default: 0
          description: |
            Control the strength of the prompt and intricacy per square pixel.
            Valid values range `[-10, 10]`, default `0`.
          maximum: 10
          minimum: -10
          type: integer
        engine:
          default: automatic
          description: Magnific model engines
          enum:
          - automatic
          - magnific_illusio
          - magnific_sharpy
          - magnific_sparkle
          type: string
        filter_nsfw:
          default: false
          description: |
            Controls **NSFW** (Not Safe For Work) content filtering on the upscaled image.

            When set to `true`, the output image will be scanned and filtered to prevent NSFW content from being returned.

            Default is `false`.
          type: boolean
      required:
      - image
      type: object
    request-content_2:
      properties:
        image:
          description: Base64 image to upscale
          format: byte
          type: string
        webhook_url:
          description: Webhook URL
          format: uri
          type: string
        sharpen:
          default: 50
          description: Sharpen the image
          maximum: 100
          minimum: 0
          type: integer
        smart_grain:
          default: 7
          description: Smart grain
          maximum: 100
          minimum: 0
          type: integer
        ultra_detail:
          default: 30
          description: Ultra detail
          maximum: 100
          minimum: 0
          type: integer
        filter_nsfw:
          default: false
          description: Enable NSFW content filtering on the output image
          type: boolean
      required:
      - image
      type: object
    request-content_3:
      properties:
        image:
          description: |
            Source image to upscale. Accepts either:
            - A publicly accessible HTTPS URL pointing to the image
            - A base64-encoded image string

            This image will be enhanced with AI-powered upscaling technology that intelligently adds details and improves image quality while increasing resolution.
          type: string
        webhook_url:
          description: |
            Optional callback URL that will receive asynchronous notifications when the upscaling task completes.
            The webhook will be called with the task status and the upscaled image URL.
          format: uri
          type: string
        sharpen:
          default: 7
          description: |
            Image sharpness intensity control. Higher values increase edge definition and clarity in the upscaled image.
            Valid values range from 0 (no sharpening) to 100 (maximum sharpness). Default is 7.
          maximum: 100
          minimum: 0
          type: integer
        smart_grain:
          default: 7
          description: |
            Intelligent grain/texture enhancement for the upscaled image. Helps preserve natural film grain and texture detail.
            Higher values add more fine-grained texture to prevent the upscaled image from looking too smooth or artificial.
            Valid values range from 0 (no grain) to 100 (maximum grain). Default is 7.
          maximum: 100
          minimum: 0
          type: integer
        ultra_detail:
          default: 30
          description: |
            Ultra detail enhancement level for the image upscaling process. This parameter controls how much fine detail
            the AI adds to the upscaled image, such as textures, patterns, and micro-details.
            Higher values create more intricate details. Valid values range from 0 to 100. Default is 30.
          maximum: 100
          minimum: 0
          type: integer
        flavor:
          $ref: "#/components/schemas/flavor"
        scale_factor:
          $ref: "#/components/schemas/request_content_3_scale_factor"
        filter_nsfw:
          default: false
          description: Enable NSFW content filtering on the output image
          type: boolean
      required:
      - image
      type: object
    flavor:
      description: |
        Image processing flavor that determines the upscaling style and optimization for different image types:
        - `sublime`: Optimized for artistic and illustrated images with smooth gradients and vibrant colors
        - `photo`: Optimized for photographic images, preserving natural colors and realistic details
        - `photo_denoiser`: Specialized for photos with noise reduction, ideal for low-light or grainy photographs
      enum:
      - sublime
      - photo
      - photo_denoiser
      type: string
    request-content_4:
      properties:
        video:
          description: |
            Source video to upscale. Accepts either:
            - A publicly accessible HTTPS URL pointing to the video
            - A base64-encoded video string
          type: string
        creativity:
          default: 0
          description: |
            Creativity intensity. Controls how much creative freedom is applied during upscaling.
            Valid values range from 0 (no creativity) to 100 (maximum creativity). Default is 0.
          maximum: 100
          minimum: 0
          type: integer
        resolution:
          $ref: "#/components/schemas/resolution_1"
        fps_boost:
          default: false
          description: Enable FPS boost to increase the frame rate of the upscaled
            video.
          type: boolean
        sharpen:
          default: 0
          description: |
            Video sharpness intensity control. Higher values increase edge definition and clarity.
            Valid values range from 0 (no sharpening) to 100 (maximum sharpness). Default is 0.
          maximum: 100
          minimum: 0
          type: integer
        smart_grain:
          default: 0
          description: |
            Applies a film grain effect to the output video. Helps preserve natural film grain and texture detail.
            Valid values range from 0 (no grain) to 100 (maximum grain). Default is 0.
          maximum: 100
          minimum: 0
          type: integer
        flavor:
          $ref: "#/components/schemas/flavor_1"
        webhook_url:
          description: |
            Optional callback URL that will receive asynchronous notifications when the upscaling task completes.
            The webhook will be called with the task status and the upscaled video URL.
          format: uri
          type: string
      required:
      - video
      type: object
    resolution_1:
      default: 2k
      description: |
        Output resolution for the video upscaling:
        - `720p`: HD output
        - `1k`: Standard definition output
        - `2k`: High definition output (default)
        - `4k`: Ultra high definition output
      enum:
      - 720p
      - 1k
      - 2k
      - 4k
      type: string
    flavor_1:
      default: vivid
      description: |
        Video processing flavor that determines the upscaling style:
        - `vivid`: Enhanced colors and contrast for more vibrant output
        - `natural`: Preserves original colors and natural appearance
      enum:
      - vivid
      - natural
      type: string
    request-content_5:
      properties:
        video:
          description: |
            Source video to upscale. Accepts either:
            - A publicly accessible HTTPS URL pointing to the video
            - A base64-encoded video string
          type: string
        resolution:
          $ref: "#/components/schemas/resolution_1"
        fps_boost:
          default: false
          description: "Enable FPS boost to increase the frame rate of the upscaled\
            \ video. When enabled, the strength parameter is ignored and the fully\
            \ upscaled result is returned."
          type: boolean
        sharpen:
          default: 0
          description: |
            Video sharpness intensity control. Higher values increase edge definition and clarity.
            Valid values range from 0 (no sharpening) to 100 (maximum sharpness). Default is 0.
          maximum: 100
          minimum: 0
          type: integer
        smart_grain:
          default: 0
          description: |
            Applies a film grain effect to the output video. Helps preserve natural film grain and texture detail.
            Valid values range from 0 (no grain) to 100 (maximum grain). Default is 0.
          maximum: 100
          minimum: 0
          type: integer
        strength:
          default: 60
          description: |
            Strength of the upscaling effect. Controls how much the output differs from the original video.
            A value of 0 returns the original video, 100 returns the fully upscaled result.
            Intermediate values blend the original with the upscaled result.
            This parameter is ignored when fps_boost is enabled. Default is 60.
          maximum: 100
          minimum: 0
          type: integer
        webhook_url:
          description: |
            Optional callback URL that will receive asynchronous notifications when the upscaling task completes.
            The webhook will be called with the task status and the upscaled video URL.
          format: uri
          type: string
      required:
      - video
      type: object
    relight-request:
      properties:
        webhook_url:
          description: |
            Optional callback URL that will receive asynchronous notifications whenever the task changes status. The payload sent to this URL is the same as the corresponding GET endpoint response, but without the data field.
          example: https://www.example.com/webhook
          format: uri
          type: string
        image:
          description: Base64 or URL of the image to do the relight
          type: string
        prompt:
          description: |
            You can guide the generation process and influence the light transfer with a descriptive prompt. For example, if the reference image is a brightly lit scene, adding something like "A sunlit forest clearing at golden hour" will be helpful.

            You can also use your imagination to alter lighting conditions in images: transforming a daytime scene into a moonlit night, enhancing the warmth of a sunset, or even dramatic changes like casting shadows of towering structures across a cityscape.

            IMPORTANT: You can emphasize specific aspects of the light in your prompt by using a number in parentheses, ranging from 1 to 1.4, like "(dark scene:1.3)".
          type: string
        transfer_light_from_reference_image:
          description: Base64 or URL of the reference image for light transfer. Incompatible
            with 'transfer_light_from_lightmap'
          type: string
        transfer_light_from_lightmap:
          description: Base64 or URL of the lightmap for light transfer. Icompatible
            with 'transfer_light_from_reference_image'
          type: string
        light_transfer_strength:
          default: 100
          description: |
            It allows you to specify the level of light transfer, meaning the intensity that your prompt, reference image, or lightmap will have. A value of 0% will keep your image closest to the original, while 100% represents the maximum possible light transfer.

            If you enable "Interpolate from original", lower values on this slider will make the result even more similar to your original image.
            Valid values range `[0, 100]`, default `100`
          maximum: 100
          minimum: 0
          type: integer
        interpolate_from_original:
          default: false
          description: |
            When enabled, this feature will make your final image interpolate from the original using the "Light transfer strength" slider, at the cost of sometimes restricting the generation's freedom.

            If disabled, the generation will be freer and will generally produce better results. However, for example, if you want to generate all the frames of a video where a room transitions from having the lights off and very dim lighting to gradually becoming fully illuminated as a new day begins, activating this option might be useful (together with gradually ingreasing the "Light transfer strength" slider).
          type: boolean
        change_background:
          default: true
          description: |
            When enabled, it will change the background based on your prompt and/or reference image. This is super useful for product placement and portraits. However, don't forget to disable it if your scene is something like a landscape or an interior.
          type: boolean
        style:
          default: standard
          enum:
          - standard
          - darker_but_realistic
          - clean
          - smooth
          - brighter
          - contrasted_n_hdr
          - just_composition
          type: string
        preserve_details:
          default: true
          description: |
            It will try to maintain the texture and small details of the original image. Especially good for product photography, texts, etc. Disable it if you prefer a smoother result.
          type: boolean
        advanced_settings:
          $ref: "#/components/schemas/relight-request-advanced-settings"
      required:
      - image
      type: object
    relight-request-advanced-settings:
      properties:
        whites:
          default: 50
          description: |
            Adjust the level of white color in the image.
            Valid values range `[0, 100]`, default `50`.
          maximum: 100
          minimum: 0
          type: integer
        blacks:
          default: 50
          description: |
            Adjust the level of black color in the image.
            Valid values range `[0, 100]`, default `50`.
          maximum: 100
          minimum: 0
          type: integer
        brightness:
          default: 50
          description: |
            Adjust the level of brightness in the image.
            Valid values range `[0, 100]`, default `50`.
          maximum: 100
          minimum: 0
          type: integer
        contrast:
          default: 50
          description: |
            Adjust the level of contrast in the image.
            Valid values range `[0, 100]`, default `50`.
          maximum: 100
          minimum: 0
          type: integer
        saturation:
          default: 50
          description: |
            Adjust the level of saturation in the image.
            Valid values range `[0, 100]`, default `50`.
          maximum: 100
          minimum: 0
          type: integer
        engine:
          default: automatic
          description: |
            Balanced: Well-rounded, general-purpose option.
            Cool: Brighter with cooler tones.
            Real: Aims to enhance photographic quality. Experimental.
            Illusio: Optimized for illustrations and drawings.
            Fairy: Suited for fantasy-themed images.
            Colorful Anime: Ideal for anime, cartoons, and vibrant colors.
            Hard Transform: Significantly alters the original image.
            Softy: Slightly softer effect, suitable for graphic designs.
          enum:
          - automatic
          - balanced
          - cool
          - real
          - illusio
          - fairy
          - colorful_anime
          - hard_transform
          - softy
          type: string
        transfer_light_a:
          default: automatic
          description: Adjusts the intensity of light transfer. Advanced feature requiring
            practice to use effectively.
          enum:
          - automatic
          - low
          - medium
          - normal
          - high
          - high_on_faces
          type: string
        transfer_light_b:
          default: automatic
          description: Also modifies light transfer intensity. Can be combined with
            the previous control for varied effects. Complex to master but offers
            more control
          enum:
          - automatic
          - composition
          - straight
          - smooth_in
          - smooth_out
          - smooth_both
          - reverse_both
          - soft_in
          - soft_out
          - soft_mid
          - strong_mid
          - style_shift
          - strong_shift
          type: string
        fixed_generation:
          default: false
          description: |
            When this option is enabled, using the same settings will consistently produce the same image. Fixed generations are ideal for fine-tuning, as it allows for incremental changes to parameters (such as the prompt) to see subtle variations in the output. When disabled, expect each generation to introduce a degree of randomness, leading to more diverse outcomes.
          type: boolean
      type: object
    change-camera-request:
      properties:
        image:
          description: |
            Input image to transform. Provide as a publicly accessible HTTPS URL.
            Supported formats: JPG, PNG, WebP.
          example: https://example.com/input-image.jpg
          type: string
        horizontal_angle:
          default: 0
          description: |
            Horizontal rotation angle in degrees. Controls the left-right rotation of the camera around the subject.
            - `0`: Front view (no rotation)
            - `90`: Right side view
            - `180`: Back view
            - `270`: Left side view
            - `360`: Full rotation (equivalent to 0)

            Valid values: `0` to `360`. Default: `0`.
          example: 45
          maximum: 360
          minimum: 0
          type: integer
        vertical_angle:
          default: 0
          description: |
            Vertical tilt angle in degrees. Controls the up-down tilt of the camera relative to the subject.
            - `-30`: Looking up at the subject from below
            - `0`: Eye-level view (no tilt)
            - `45`: Moderate downward angle
            - `90`: Bird's eye view (directly above)

            Valid values: `-30` to `90`. Default: `0`.
          example: 15
          maximum: 90
          minimum: -30
          type: integer
        zoom:
          default: 5
          description: |
            Zoom level controlling how close the camera appears to the subject.
            - `0`: Wide shot (far away, full scene visible)
            - `5`: Medium shot (standard framing)
            - `10`: Close-up (very close to the subject)

            Valid values: `0` to `10`. Default: `5`.
          example: 5
          maximum: 10
          minimum: 0
          type: integer
        seed:
          description: |
            Seed for the random number generator. Using the same seed with identical parameters produces the same output, enabling reproducible results across multiple requests.
          example: 42
          minimum: 1
          type: integer
        output_format:
          $ref: "#/components/schemas/output-format"
        webhook_url:
          description: |
            Optional callback URL that will receive asynchronous notifications whenever the task changes status. The payload sent to this URL is the same as the corresponding GET endpoint response, but without the data field.
          example: https://www.example.com/webhook
          format: uri
          type: string
      required:
      - image
      type: object
    output-format:
      default: png
      description: |
        Output image format.
        - `png`: Lossless compression, best for high-quality results
        - `jpeg`: Lossy compression, smaller file size suitable for web use
      enum:
      - png
      - jpeg
      type: string
    mystic-request:
      description: |
        ### Model Compatibility and LoRA Usage

        The Mystic API supports different model configurations with varying LoRA compatibility:

        **LoRA-Compatible Configuration:**
        - Use the default model (no `model` field specified)
        - No `structure_reference` or `style_reference` provided
        - LoRAs can be used via:
          - Character syntax in prompt: `@character_name` or `@character_name::strength`
          - `styling.characters` array
          - `styling.styles` array

        **LoRA-Incompatible Configurations:**
        - **Specific Models**: `fluid`, `flexible` , `super_real` and `editorial_portraits` models ignore all LoRAs
        - **Structure Reference**: When `structure_reference` is provided, LoRAs are ignored
        - **Style Reference**: When `style_reference` is provided, LoRAs are ignored
        - **Combined References**: When both `structure_reference` and `style_reference` are provided, LoRAs are ignored

        **Important**: The API will not return errors for incompatible combinations. Instead, LoRAs will be silently ignored, and the request will proceed with the selected model configuration.
      properties:
        prompt:
          description: |
            ### AI Model Prompt Description

            The prompt is a short text that describes the image you want to generate. It can range from simple descriptions, like `"a cat"`, to detailed scenarios, such as `"a cat with wings, playing the guitar, and wearing a hat"`. If no prompt is provided, the AI will generate a random image.

            #### Adding Characters to the Prompt
            You can introduce characters into the prompt using the following syntax:
            - `@character_name`: Represents the character you want to include.
              Example: `My friend @john is a great artist.`

            #### Modifying Character Strength
            To adjust the influence or "strength" of a character in the image, use the following syntax:
            - `@character_name::strength`: Specify the character's strength by appending `::strength` to their name, where `strength` is a numerical value.
              Example: `My friend @john::200 is a great artist.`

            Higher strength values will make the character more prominent in the generated image.
          type: string
          default: null
        webhook_url:
          description: |
            Optional callback URL that will receive asynchronous notifications whenever the task changes status. The payload sent to this URL is the same as the corresponding GET endpoint response, but without the data field.
          example: https://www.example.com/webhook
          format: uri
          type: string
        structure_reference:
          description: |
            ### Structure Reference
            Base64 image to use as structure reference. Using images as structure references allows you to influence the shape of your final image. This feature enables various creative applications such as coloring sketches, transforming cartoons into realistic images, texturing basic 3D models, or converting real images into cartoons. The outcome is entirely controlled by your prompt, offering limitless creative possibilities.
          format: byte
          type: string
        structure_strength:
          default: 50
          description: |
            Note: This parameter only takes effect when a `"structure_reference"` image is provided.
            Allows to maintain the structure of the original image.
          maximum: 100
          minimum: 0
          type: integer
        style_reference:
          description: |
            ### Style Reference
            Base64 image to use as style reference. Using images as style references allows you to influence the aesthetic of your creation. This is possibly the most powerful tool of Mystic, as it truly lets you create incredibly unique images.
          format: byte
          type: string
        adherence:
          default: 50
          description: |
            Note: This parameter only takes effect when a `"style_reference"` image is provided.
            Increasing this value will make your generation more faithful to the prompt, but it may transfer the style a bit less accurately. Higher values can help fix small artifacts, anatomical errors and text readability. Lower values will give you more creative images and closer to the style reference.
          maximum: 100
          minimum: 0
          type: integer
        hdr:
          default: 50
          description: |
            Note: This parameter only takes effect when a `"style_reference"` image is provided.
            Increasing this value can give you a more detailed image, at the cost of a more 'AI look' and slightly worse style transfer. Lower values have a more natural and artistic look but may increase artifacts.
          maximum: 100
          minimum: 0
          type: integer
        resolution:
          default: 2k
          description: Resolution of the image
          enum:
          - 1k
          - 2k
          - 4k
          type: string
        aspect_ratio:
          default: square_1_1
          description: |
            Image size with the aspect ratio. The aspect ratio is the proportional relationship between an image's width and height, expressed as *_width_height (e.g., square_1_1, widescreen_16_9). It is calculated by dividing the width by the height.\
            If not present, the default is `square_1_1`.
            Note: For the `fluid` model, only this values are valid:
            * square_1_1
            * social_story_9_16
            * widescreen_16_9
            * traditional_3_4
            * classic_4_3
          enum:
          - square_1_1
          - classic_4_3
          - traditional_3_4
          - widescreen_16_9
          - social_story_9_16
          - smartphone_horizontal_20_9
          - smartphone_vertical_9_20
          - standard_3_2
          - portrait_2_3
          - horizontal_2_1
          - vertical_1_2
          - social_5_4
          - social_post_4_5'
          example: square_1_1
          type: string
        model:
          default: realism
          description: |
            * `zen` - for smoother, basic, and cleaner results. Fewer objects in the scene and less intricate details. The softer looking one.

            * `flexible` - good prompt adherence. However, it has results that are a bit more HDR and saturated than Realism or Fluid. It's especially good with illustrations, fantastical prompts, and for diving into the latent space in search of very specific visual styles.

            * `fluid` - the model that adheres best to prompts with great average quality for all kind of images. It can generate really creative images! It will always follow your input no matter what. However, since it is using Google's Imagen 3, it is a bit over-moderated, and some simple prompts containing words like "war" may be flagged and not generated (sorry about that! But there's nothing we can do!).

            * `realism` - with a more realistic color palette. It tries to give an extra boost of reality to your images, a kind of "less AI look". Works especially well with photographs but also magically works with illustrations too. IMPORTANT: you should use Zen, Flexible or Fluid if you are trying to generate something that is really fantastic or a known character, Realism may not follow your prompt well.

            * `super_real` - if reality is your priority, this is your model. Nearly as versatile as Flexible, it excels in realism outperforming Editorial Portraits in medium shots, though not as strong for close-ups.

            * `editorial_portraits` - the most amazing state-of-the-art generator for editorial portraits. You have never seen a level of realism like this before. Perfect for hyperrealistic close-up or medium shots. Unfortunately, in wide or distant shots, it generates anatomical problems and artifacts... but for close-ups, it is simply the best on the market. Tip: use the longest and most explanatory prompts possible, they really suit it well!
          enum:
          - realism
          - fluid
          - zen
          - flexible
          - super_real
          - editorial_portraits
          type: string
        creative_detailing:
          default: 33
          description: |
            Higher values can achieve greater detail per pixel at higher resolutions at the cost of giving a somewhat more "HDR" or artificial look.
            Very high values can generate quite crazy things like eyes where they shouldn't appear, etc.

            Valid values range `[0, 100]`, default `33`
          maximum: 100
          minimum: 0
          type: integer
        engine:
          default: automatic
          description: |
            Select the engine for the AI model. Available options:
              * `automatic` - default choice
              * `Illusio` - for smoother illustrations, landscapes, and nature. The softer looking one.
              * `Sharpy` - better for realistic images like photographs and for a more grainy look. It provides the sharpest and most detailed images. If you use it for illustrations it will give them more texture and a less softer look.
              * `Sparkle` - also good for realistic images. It's a middle ground between Illusio and Sharpy.
          enum:
          - automatic
          - magnific_illusio
          - magnific_sharpy
          - magnific_sparkle
          type: string
        fixed_generation:
          default: false
          description: |
            When this option is enabled, using the same settings will consistently produce the same image.
            Fixed generations are ideal for fine-tuning, as it allows for incremental changes to parameters (such as the prompt) to see subtle variations in the output.
            When disabled, expect each generation to introduce a degree of randomness, leading to more diverse outcomes.
          type: boolean
        filter_nsfw:
          default: true
          description: |
            Controls **NSFW** (Not Safe For Work) content filtering during generation.

            This parameter is always set to `true` by default and NSFW filtering **cannot be disabled** for standard API usage. Only authorized clients with special permissions can disable this filter.

            **Important:** If your use case requires disabling NSFW filtering, please contact our support team to discuss your requirements and potential authorization.
          type: boolean
        styling:
          $ref: "#/components/schemas/mystic_request_styling"
      type: object
