    motion-control-request:
      properties:
        webhook_url:
          description: "Webhook URL to notify you when the task completes. When provided,\
            \ the server will send a POST request to this URL with the task result."
          format: uri
          type: string
        image_url:
          description: |
            URL of the character/reference image. The motion from the reference video will be transferred to this character.

            **Requirements:**
            - Must be a publicly accessible URL
            - Minimum resolution: 300x300 pixels
            - Maximum file size: 10MB
            - Supported formats: JPG, JPEG, PNG, WEBP
          format: uri
          type: string
        video_url:
          description: |
            URL of the reference video containing the motion to transfer.

            **Requirements:**
            - Must be a publicly accessible URL
            - Duration: 3-30 seconds
            - Supported formats: MP4, MOV, WEBM, M4V
          format: uri
          type: string
        prompt:
          description: Optional text prompt to guide the motion transfer. Cannot exceed
            2500 characters.
          maxLength: 2500
          type: string
        character_orientation:
          default: video
          description: |
            How the model interprets spatial information and constrains output duration.

            - **video**: Orientation matches reference video. Better for complex motions. Maximum output duration: 30 seconds.
            - **image**: Orientation matches reference image. Better for following camera movements. Maximum output duration: 10 seconds.
          enum:
          - video
          - image
          type: string
        cfg_scale:
          default: 0.5
          description: The CFG (Classifier Free Guidance) scale controls how closely
            the model follows the prompt. Higher values mean stronger adherence to
            the prompt but less flexibility.
          format: float
          maximum: 1
          minimum: 0
          type: number
      required:
      - image_url
      - video_url
      type: object
    kling-v3-request:
      properties:
        webhook_url:
          description: |
            Optional callback URL that receives asynchronous notifications when the task changes status.
            The payload includes the task status and result URL when completed.
          format: uri
          type: string
        prompt:
          description: |
            Text prompt describing the desired video content. Maximum 2500 characters.
            Required for text-to-video mode or when not using multi_prompt.

            **Tips for better results:**
            - Be specific about motion, camera angles, and actions
            - Describe the scene, characters, and atmosphere
            - Reference elements in your prompt as @Element1, @Element2
            - Reference voices with <<<voice_1>>> and <<<voice_2>>>
          maxLength: 2500
          type: string
        multi_prompt:
          description: |
            Multi-shot prompts with durations for sequential video generation.
            Each item specifies a prompt and duration (in seconds) for that shot.
            Maximum 6 shots. Total duration across all shots cannot exceed 15 seconds.

            Only effective when shot_type is set. When multi_prompt is provided without an explicit shot_type, it defaults to "customize".
            When shot_type is "intelligent", Kling can auto-segment the video even without multi_prompt.
          items:
            $ref: "#/components/schemas/kling-v3-multi-prompt-item"
          maxItems: 6
          type: array
        start_image_url:
          description: |
            URL of the image to use as the first frame of the video.
            Required for image-to-video mode.

            **Image requirements:**
            - Minimum: 300x300 pixels
            - Maximum: 10MB file size
            - Aspect ratio: 1:2.5 to 2.5:1
            - Formats: JPG, JPEG, PNG
          type: string
        end_image_url:
          description: |
            URL of the image to use as the final frame of the video.
            Optional for image-to-video mode.

            **Image requirements:**
            - Same as start_image_url
          type: string
        elements:
          description: |
            Custom characters/objects with reference images for consistent identity across the video.
            Reference in your prompt as @Element1, @Element2, etc.
            When elements are provided, the request is processed in image-to-video mode.
            For best results, also provide a `start_image_url`.
          items:
            $ref: "#/components/schemas/kling-v3-element"
          type: array
        generate_audio:
          default: true
          description: Whether to generate native audio for the video.
          type: boolean
        multi_shot:
          default: false
          description: |
            Enable multi-shot mode for multi-scene video generation.
            When true, use shot_type and multi_prompt to define scenes.
            When false (default), generates a single continuous video.
          type: boolean
        shot_type:
          default: customize
          description: |
            Controls how multi-shot video generation is segmented:
            - `customize`: User provides explicit per-shot prompts and durations via the multi_prompt array. Each shot is defined manually.
            - `intelligent`: Enables automatic scene segmentation by Kling AI. Can be used without multi_prompt (Kling auto-segments the video based on the main prompt) or with multi_prompt (user-defined shots combined with AI segmentation).

            Note: This parameter maps to Kling's internal "intelligence" spelling for the intelligent option.
            Defaults to "customize" when multi_prompt is provided.
          enum:
          - customize
          - intelligent
          type: string
        aspect_ratio:
          $ref: "#/components/schemas/kling-v3-aspect-ratio"
        duration:
          $ref: "#/components/schemas/kling-v3-duration"
        negative_prompt:
          default: "blur, distort, and low quality"
          description: Undesired elements to avoid in the generated video. Maximum
            2500 characters.
          maxLength: 2500
          type: string
        cfg_scale:
          default: 0.5
          description: |
            Guidance scale controlling prompt adherence versus creative freedom. Range: 0 to 1.
            Values above 1 are not supported for Kling 3 (only Kling 1.x models support cfg_scale up to 2).

            - **0**: Maximum creative freedom, loosest interpretation of the prompt
            - **0.5** (default): Balanced between prompt adherence and creativity
            - **1**: Strongest adherence to the prompt, least creative variation
          format: float
          maximum: 1
          minimum: 0
          type: number
      type: object
    kling-v3-multi-prompt-item:
      description: Multi-shot prompt item with prompt text and duration for Kling
