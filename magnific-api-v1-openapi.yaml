    advanced-custom-elements-request:
      properties:
        element_name:
          description: Name of the custom element. Must not exceed 20 characters.
          maxLength: 20
          type: string
        element_description:
          description: Description of the custom element. Must not exceed 100 characters.
          maxLength: 100
          type: string
        reference_type:
          $ref: "#/components/schemas/advanced-custom-elements-reference-type"
        element_image_list:
          $ref: "#/components/schemas/advanced-custom-elements-image-list"
        element_video_list:
          $ref: "#/components/schemas/advanced-custom-elements-video-list"
        element_voice_id:
          description: |
            Bind the element to an existing voice from the tone library. When empty, the element is not bound to a voice.
            The voice ID can be obtained through the voice-related API. Only elements customized via video reference support voice binding.
          type: string
        tag_list:
          description: Configure category tags for the element. One element can have
            multiple tags.
          items:
            $ref: "#/components/schemas/advanced-custom-elements-tag"
          type: array
        webhook_url:
          description: |
            Optional callback URL that will receive asynchronous notifications whenever the task changes status. The payload sent to this URL is the same as the corresponding GET endpoint response, but without the data field.
          example: https://www.example.com/webhook
          format: uri
          type: string
      required:
      - element_description
      - element_name
      - reference_type
      type: object
    advanced-custom-elements-reference-type:
      description: |
        Reference method for defining the element's appearance:
        - `image_refer`: Multi-Image Elements. The element appearance is defined from reference images (element_image_list). Supported formats: .jpg, .jpeg, .png. Max 10MB per image. Min 300px dimensions. Aspect ratio between 1:2.5 and 2.5:1.
        - `video_refer`: Video Character Elements. The element appearance is defined from a reference video (element_video_list). Only .mp4/.mov formats, 1080P, 3-8 seconds duration, 16:9 or 9:16 aspect ratio, max 200MB.
      enum:
      - image_refer
      - video_refer
      type: string
    advanced-custom-elements-image-list:
      description: |
        Reference images for defining the element. Required when reference_type is `image_refer`, ignored when reference_type is `video_refer`.
        Provide one frontal reference image and 1 to 3 additional reference images from different angles or close-ups.
      properties:
        frontal_image:
          description: "Frontal reference image URL or Base64 encoding. At least one\
            \ frontal reference image is required. Supported formats: .jpg, .jpeg,\
            \ .png. Max file size: 10MB. Min dimensions: 300px. Aspect ratio: 1:2.5\
            \ to 2.5:1."
          type: string
        refer_images:
          description: 1 to 3 additional reference images from other angles or close-ups.
            These should differ from the frontal reference image.
          items:
            $ref: "#/components/schemas/advanced-custom-elements-refer-image"
          maxItems: 3
          minItems: 1
          type: array
      required:
      - frontal_image
      - refer_images
      type: object
    advanced-custom-elements-refer-image:
      properties:
        image_url:
          description: "Reference image URL or Base64 encoding. Supported formats:\
            \ .jpg, .jpeg, .png. Max file size: 10MB. Min dimensions: 300px."
          type: string
      required:
      - image_url
      type: object
    advanced-custom-elements-video-list:
      description: |
        Reference video for defining the element. Required when reference_type is `video_refer`, ignored when reference_type is `image_refer`.
        Only one video can be uploaded. If the video contains human voice, voice tone customization will be initiated.
      properties:
        refer_videos:
          description: Reference videos. Only 1 video can be uploaded.
          items:
            $ref: "#/components/schemas/advanced-custom-elements-refer-video"
          maxItems: 1
          minItems: 1
          type: array
      required:
      - refer_videos
      type: object
    advanced-custom-elements-refer-video:
      properties:
        video_url:
          description: "Reference video URL. Only .mp4/.mov formats supported. Must\
            \ be 1080P with duration between 3 and 8 seconds, aspect ratio 16:9 or\
            \ 9:16. Max file size: 200MB."
          type: string
      required:
      - video_url
      type: object
    advanced-custom-elements-tag:
      properties:
        tag_id:
          $ref: "#/components/schemas/advanced-custom-elements-tag-id"
      required:
      - tag_id
      type: object
    advanced-custom-elements-tag-id:
      description: |
        Tag category for the element:
        - `o_101`: Hottest
        - `o_102`: Character
        - `o_103`: Animal
        - `o_104`: Item
        - `o_105`: Costume
        - `o_106`: Scene
        - `o_107`: Effect
        - `o_108`: Others
      enum:
      - o_101
      - o_102
      - o_103
      - o_104
      - o_105
      - o_106
      - o_107
      - o_108
      type: string
