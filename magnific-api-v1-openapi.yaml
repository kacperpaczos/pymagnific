  /v1/ai/flows/runs/{run-id}:
    get:
      description: |
        Retrieve the current status and results of a flow execution run.

        Use this endpoint to **poll** the status of a run after calling the
        `POST /v1/ai/flows/{flow-id}/run` endpoint. The `run_id` path parameter
        corresponds to the `workflow_run_identifier` returned in the run response.

        **Polling strategy:**
        - Wait 2-3 seconds after starting the run before the first poll
        - Poll every 3-5 seconds
        - When `status` is `completed`, the `result` field contains download URLs
        - When `status` is `failed`, the `error_message` field describes the failure

        **Asset URLs** in the `result` field are temporary and valid for **12 hours**.

        **Statuses:**
        | Status | Description |
        |--------|-------------|
        | `pending` | Run is queued but has not started yet |
        | `running` | Flow is executing |
        | `completed` | Finished successfully, `result` is available |
        | `completed_with_errors` | Execution finished but some nodes failed |
        | `failed` | Execution failed, see `error_message` |
        | `cancelled` | Execution was cancelled |

        <Note>
          **Available on Enterprise and subscription plans.** This endpoint is available to Enterprise customers and Premium, Premium+, Pro, and Business subscription plans. It is not available on pay-as-you-go. [Contact sales](https://www.magnific.com/api#contact) for Enterprise access.
        </Note>
      operationId: get_flow_run
      parameters:
      - description: |
          Unique identifier (SQID) of the flow run. This is the
          `workflow_run_identifier` value returned by the `POST /v1/ai/flows/{flow-id}/run` endpoint.
        in: path
        name: run-id
        required: true
        schema:
          example: omps2OH829
          type: string
      responses:
        "200":
          content:
            application/json:
              examples:
                completed:
                  summary: Completed run with image results
                  value:
                    data:
                      run_id: omps2OH829
                      status: completed
                      app_id: uqzQLDr2Aw
                      started_at: 2026-02-25T12:00:00+00:00
                      completed_at: 2026-02-25T12:02:00+00:00
                      error_message: null
                      result:
                        images:
                        - id: abc123
                          url: https://pikaso.cdnpk.net/private/production/1234567890/render.png?token=exp_1234567890~hmac_abc123
                          tool: text-to-image
                          duration: null
                          width: 1024
                          height: 1024
                          created_at: 2026-02-25T12:02:00+00:00
                        videos: []
                        audios: []
                running:
                  summary: Run still in progress
                  value:
                    data:
                      run_id: omps2OH829
                      status: running
                      app_id: uqzQLDr2Aw
                      started_at: 2026-02-25T12:00:00+00:00
                      completed_at: null
                      error_message: null
                      result: null
                failed:
                  summary: Failed run
                  value:
                    data:
                      run_id: omps2OH829
                      status: failed
                      app_id: uqzQLDr2Aw
                      started_at: 2026-02-25T12:00:00+00:00
                      completed_at: 2026-02-25T12:01:30+00:00
                      error_message: "Node 'image-upscaler' failed: input image exceeds\
                        \ maximum resolution"
                      result: null
              schema:
                $ref: "#/components/schemas/get_flow_run_200_response"
          description: OK - Run status and result.
        "401":
          content:
            application/json:
              examples:
                invalid_api_key:
                  summary: API key is not valid
                  value:
                    message: Invalid API key
                missing_api_key:
                  summary: API key is not provided
                  value:
                    message: Missing API key
              schema:
                $ref: "#/components/schemas/get_all_style_transfer_tasks_400_response"
          description: Unauthorized - The client must authenticate itself to get the
