        Authenticates via API key (`X-Magnific-API-Key` header). The caller's identity
        is resolved automatically from the API key.

        Response always includes per-user breakdown with email and per-project grouping
        (same data as the CSV export). Tool names are returned as display names
        (e.g. "AI Image Models", "Asset Download") instead of internal codes.

        Date range limits: Enterprise up to 365 days, Business up to 180 days.
        If no dates are provided, defaults to the last 7 days.

        Available exclusively for Business and Enterprise plans. Rate limit: 100 RPD.

        Response field mapping (differs from internal endpoints):
        - `tool`: display name (e.g. "AI Image Models") instead of internal code
        - `user_uses`: number of operations (replaces `count`)
        - `user_credits`: credits consumed (replaces `total_amount`/`amount`)
