        type: integer
    image-size-custom:
      description: "Resizes the photo to a specified size while maintaining aspect\
        \ ratio. Accepts a pixel value (100px to 2000px) or \nkeywords small(1000px),\
        \ medium(1500px), large(2000px), original corresponding to standard website\
        \ sizes.\nThe size depends on the image orientation, the longest side of the\
        \ image will be resized to the specified size.\nIf not specified, the highest\
        \ resolution is provided. Applicable only to photos.\n"
