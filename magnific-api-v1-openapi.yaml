    t2v-request:
      description: "Generate video from a text prompt using WAN 2.7. Supports configurable\
        \ aspect ratios (16:9, 9:16, 1:1, 4:3, 3:4), resolutions (720P, 1080P), optional\
        \ audio input, and duration from 2 to 15 seconds."
      properties:
        webhook_url:
          description: |
            Optional callback URL that will receive asynchronous notifications whenever the task changes status. The payload sent to this URL is the same as the corresponding GET endpoint response, but without the data field.
          example: https://www.example.com/webhook
          format: uri
          type: string
        prompt:
          description: |
            Text description of the video to generate. Describe the scene, characters, motion, camera movements, lighting, and style in detail for best results.

            **Tips:**
            - Be specific about scenes and visual details
            - Describe camera movements (zoom, pan, tilt)
            - Mention lighting and atmosphere

            **Examples:**
            - Simple: "a cat sitting on a windowsill"
            - Detailed: "fluffy orange cat on wooden windowsill, looking at snow falling outside, soft warm lighting, cinematic slow camera pan"
          example: "A serene mountain landscape at golden hour with mist rising through\
            \ the valley, cinematic slow camera pan"
          maxLength: 5000
          type: string
        negative_prompt:
          description: |
            Elements to avoid in the generated video. Use this to prevent unwanted artifacts or styles.

            **Examples:** "blurry, low quality, watermark, text, distortion, extra limbs"
          example: "watermark, text, distortion, blurry, extra limbs"
          maxLength: 500
          type: string
        audio_url:
          description: |
            URL of an audio file to guide the video generation. If not provided, the model may auto-generate audio.

            **Supported formats:** WAV, MP3
            **Duration:** 2-30 seconds
            **Maximum file size:** 15MB
          format: uri
          type: string
        aspect_ratio:
          $ref: "#/components/schemas/aspect-ratio"
        resolution:
          $ref: "#/components/schemas/resolution"
        duration:
          default: 5
          description: Duration of the output video in seconds.
          example: 5
          maximum: 15
          minimum: 2
          type: integer
        seed:
          description: Random seed for reproducible generation. Use the same seed
            with identical parameters to reproduce results. Leave unset for random
            seed.
          example: 12345
          maximum: 2147483647
          minimum: 0
          type: integer
        additional_settings:
          $ref: "#/components/schemas/additional-settings"
      required:
      - prompt
      title: Text to Video - WAN 2.7
      type: object
    aspect-ratio:
      default: 16:9
      description: |
        Output video aspect ratio:
        - `16:9`: Landscape (widescreen)
        - `9:16`: Portrait (vertical, mobile-optimized)
        - `1:1`: Square
        - `4:3`: Standard landscape
        - `3:4`: Standard portrait
